<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: file: https:; media-src 'self' file: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https:;">
  <title>Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=JetBrains+Mono:wght@400;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Visual system: spacing, radii, palette, and scale */
      --ui-scale: 1; /* change to 0.75–1.5 for different output resolutions */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;

      /* Palette (2–3 accents + neutrals) */
      --bg-rgb: 8, 12, 18;
      --overlay-bg-alpha: 0.14;
      --overlay-bg: rgba(var(--bg-rgb), var(--overlay-bg-alpha));
      --neutral-1: #0b0d10;
      --neutral-2: rgba(255,255,255,0.04);
      --accent-1: #7f95ff; /* primary */
      --accent-2: #9b83ff; /* secondary */
      --accent-3: #76c5b6; /* helper */
      --warn: #ffb37e;
      --danger: #ff8da1;

      --text: #f2f6f7;
      --overlay-text: #ffffff;
      --muted: rgba(242,246,247,0.64);
      --muted-2: rgba(242,246,247,0.38);

      --shadow-soft: 0 10px 30px rgba(0,0,0,0.36);
      --shadow-elev: 0 22px 48px rgba(0,0,0,0.44);

      --transition-fast: 160ms cubic-bezier(.22,.9,.28,1);
      --transition-med: 240ms cubic-bezier(.22,.9,.28,1);
      --gold-1: #ffd36b;
      --gold-2: #ffb84d;
      --silver-1: #d7e3ff;
      --silver-2: #aab8ff;

      /* Overlay customization overrides (set via IPC) */
      --overlay-border-color: transparent;
      --overlay-border-width: 0px;
      --overlay-radius: 14px;
      --team-1-color: #76c5b6;
      --team-2-color: #ff8da1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Syne', sans-serif;
      color: var(--overlay-text);
    }

    body {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      animation: overlayEnter 320ms ease forwards;
    }

    @keyframes overlayEnter {
      to {
        opacity: 1;
        transform: none;
      }
    }

    #overlay-root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      border-radius: var(--overlay-radius);
      padding: 0;
      position: relative;
    }

    .overlay-watermark {
      position: absolute;
      bottom: 6px;
      right: 10px;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 400ms ease;
    }
    .overlay-watermark.show { opacity: 0.5; }

    /* Window resize handles */
    .resize-handle {
      position: absolute;
      z-index: 1000;
    }
    .resize-handle.edge-n { top: -8px; left: 0; right: 0; height: 16px; cursor: ns-resize; }
    .resize-handle.edge-s { bottom: -8px; left: 0; right: 0; height: 16px; cursor: ns-resize; }
    .resize-handle.edge-e { top: 0; right: -8px; width: 16px; bottom: 0; cursor: ew-resize; }
    .resize-handle.edge-w { top: 0; left: -8px; width: 16px; bottom: 0; cursor: ew-resize; }
    .resize-handle.corner-ne { top: -8px; right: -8px; width: 16px; height: 16px; cursor: nesw-resize; }
    .resize-handle.corner-nw { top: -8px; left: -8px; width: 16px; height: 16px; cursor: nwse-resize; }
    .resize-handle.corner-se { bottom: -8px; right: -8px; width: 16px; height: 16px; cursor: nwse-resize; }
    .resize-handle.corner-sw { bottom: -8px; left: -8px; width: 16px; height: 16px; cursor: nesw-resize; }

    .overlay-shell {
      width: 100%;
      height: 100%;
      position: relative;
      border: 0;
      border-radius: calc(var(--radius) * 1px);
      overflow: hidden;
      background: var(--overlay-bg);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(6px) saturate(102%);
      transform-origin: center center;
      transform: scale(var(--ui-scale));
      transition: transform var(--transition-med), box-shadow var(--transition-med), opacity var(--transition-fast);
      -webkit-app-region: drag;
    }

    .overlay-shell button,
    .overlay-shell input,
    .overlay-shell select,
    .overlay-shell textarea,
    .overlay-shell label,
    .overlay-shell a,
    .overlay-shell .resize-handle,
    .overlay-shell .maps-image-handle,
    .overlay-shell .preview-hud,
    .overlay-shell [data-tooltip] {
      -webkit-app-region: no-drag;
    }

    /* When full transparency is requested, clear container backgrounds but keep text/pill borders visible */
    .overlay-full-transparent .overlay-shell {
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      background-image: none !important;
      background-color: transparent !important;
      backdrop-filter: none !important;
    }

    .overlay-full-transparent .onevone-container,
    .overlay-full-transparent .bam-container,
    .overlay-full-transparent .maps-stage,
    .overlay-full-transparent .scrim-art,
    .overlay-full-transparent .fourvone-glass-inner,
    .overlay-full-transparent .fourvone-glass-image,
    .overlay-full-transparent .winstreak-art,
    .overlay-full-transparent .winstreak-model,
    .overlay-full-transparent .winstreak-fire-shell,
    .overlay-full-transparent .winstreak-fire-layer,
    .overlay-full-transparent .winstreak-fire-sparks,
    .overlay-full-transparent .winstreak-dark-layout,
    .overlay-full-transparent .winstreak-ember-layout,
    .overlay-full-transparent .winstreak-ember-model,
    .overlay-full-transparent .winstreak-art-survivor,
    .overlay-full-transparent .survivor-emblem,
    .overlay-full-transparent .fourvone-glass-inner,
    .overlay-full-transparent .fourvone-glass-image {
      box-shadow: none !important;
      background-image: none !important;
      background-color: transparent !important;
      backdrop-filter: none !important;
    }

    .overlay-full-transparent .fourvone-glass-smoke {
      opacity: 0 !important;
    }

    .overlay-full-transparent .winstreak-fire-shell,
    .overlay-full-transparent .winstreak-dark-layout,
    .overlay-full-transparent .winstreak-ember-layout {
      border-color: transparent !important;
      outline: none !important;
    }

    .overlay-full-transparent .winstreak-survivor-progress-shell,
    .overlay-full-transparent .winstreak-survivor-progress-ring,
    .overlay-full-transparent .winstreak-survivor-progress-bar,
    .overlay-full-transparent .winstreak-survivor-progress-track,
    .overlay-full-transparent .winstreak-survivor-progress-fill,
    .overlay-full-transparent .winstreak-survivor-progress-side {
      border-color: transparent !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .overlay-full-transparent .winstreak-model::after,
    .overlay-full-transparent .winstreak-art::after,
    .overlay-full-transparent .winstreak-art-survivor::before,
    .overlay-full-transparent .survivor-emblem::before {
      box-shadow: none !important;
      border-color: transparent !important;
    }

    .overlay-full-transparent .winstreak-fire-layer,
    .overlay-full-transparent .winstreak-fire-sparks {
      opacity: 0 !important;
    }

    .overlay-full-transparent .scrim-setlabel,
    .overlay-full-transparent .scrim-detail,
    .overlay-full-transparent .scrim-wincon,
    .overlay-full-transparent .fourvone-topline,
    .overlay-full-transparent .scrim-meta,
    .overlay-full-transparent .scrim-content,
    .overlay-full-transparent .fourvone-glass-wrap {
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
    }

    /* Minimal boxes mode: remove pill/card backgrounds and borders for specific elements */
    .overlay-minimal .scrim-detail,
    .overlay-minimal .scrim-setlabel,
    .overlay-minimal .scrim-wincon,
    .overlay-minimal .winstreak-wincon,
    .overlay-minimal .onevone-card,
    .overlay-minimal .maps-card,
    .overlay-minimal .onevone-players,
    .overlay-minimal .scrim-meta {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .overlay-minimal .scrim-detail[data-tooltip] { padding-left: 6px; padding-right:6px; }

    .overlay-unavailable {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background: #1a1a1a !important;
    }

    .unavailable-message {
      text-align: center;
      color: white;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .unavailable-text {
      font-size: 48px;
      margin-bottom: 16px;
      color: white;
      font-weight: 700;
      text-transform: uppercase;
    }

    .unavailable-subtext {
      font-size: 24px;
      color: white;
      font-weight: 400;
      opacity: 0.8;
    }

    /* Force scrim overlay full transparency: remove visible backgrounds, but add floating border frames */
    .overlay-shell.ov-fourvone {
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
    }

    /* Scrim matchup: killer vs team names - static text, no wrapping, no floating */
    .overlay-shell.ov-fourvone .scrim-matchup {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      background: transparent !important;
      border: 1.5px solid rgba(118, 197, 182, 0.4) !important;
      border-radius: 12px !important;
      padding: 8px 12px !important;
      box-shadow: 0 0 16px rgba(118, 197, 182, 0.12) !important;
      white-space: nowrap !important;
      font-size: clamp(16px, 3vw, 28px) !important;
      color: var(--overlay-text) !important;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scrim wincon pill */
    .overlay-shell.ov-fourvone .scrim-wincon {
      display: inline-flex !important;
      background: transparent !important;
      border: 1.5px solid rgba(118, 197, 182, 0.4) !important;
      border-radius: 12px !important;
      padding: 6px 12px !important;
      box-shadow: 0 0 16px rgba(118, 197, 182, 0.12) !important;
      transition: box-shadow var(--transition-med), border-color var(--transition-med);
      animation: floatingBorder 3.2s ease-in-out infinite;
      animation-delay: 0.4s;
      color: var(--overlay-muted) !important;
    }

    /* Scrim detail pills */
    .overlay-shell.ov-fourvone .scrim-detail {
      display: inline-flex !important;
      background: transparent !important;
      border: 1.5px solid rgba(118, 197, 182, 0.4) !important;
      border-radius: 12px !important;
      padding: 6px 12px !important;
      box-shadow: 0 0 16px rgba(118, 197, 182, 0.12) !important;
      transition: box-shadow var(--transition-med), border-color var(--transition-med);
      animation: floatingBorder 3.2s ease-in-out infinite;
      color: var(--overlay-muted) !important;
    }

    .overlay-shell.ov-fourvone .scrim-setlabel {
      display: inline-flex !important;
      align-items: center;
      gap: 8px;
      font-size: clamp(13px, 1.3vw, 18px) !important;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--overlay-text) !important;
      background: rgba(8, 12, 18, 0.72) !important;
      border: 1px solid rgba(118, 197, 182, 0.62) !important;
      border-radius: 999px !important;
      padding: 8px 14px !important;
      box-shadow: 0 0 18px rgba(118, 197, 182, 0.18) !important;
      animation: floatingBorder 3.2s ease-in-out infinite;
    }

    @keyframes floatingBorder {
      0% { 
        transform: translateY(0) scale(1);
        border-color: rgba(118, 197, 182, 0.3);
        box-shadow: 0 0 16px rgba(118, 197, 182, 0.12);
      }
      50% { 
        transform: translateY(-3px) scale(1.02);
        border-color: rgba(118, 197, 182, 0.6);
        box-shadow: 0 8px 24px rgba(118, 197, 182, 0.18);
      }
      100% { 
        transform: translateY(0) scale(1);
        border-color: rgba(118, 197, 182, 0.3);
        box-shadow: 0 0 16px rgba(118, 197, 182, 0.12);
      }
    }

    .overlay-hidden {
      display: none !important;
    }

    .overlay-label {
      position: absolute;
      top: 14px;
      left: 16px;
      z-index: 3;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--overlay-muted);
    }

    .overlay-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: calc(var(--space-sm)) calc(var(--space-md));
      border-radius: 999px;
      border: 1px solid var(--neutral-2);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .overlay-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--overlay-accent);
      box-shadow: 0 0 16px rgba(118, 197, 182, 0.65);
    }

    .timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: calc(clamp(28px, 6vw, 64px) * var(--ui-scale));
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 6px 28px rgba(0,0,0,0.45);
      transition: color var(--transition-fast), transform var(--transition-fast), text-shadow var(--transition-fast);
      will-change: transform, color;
    }

    .timer.running {
      color: #77e3c6;
    }

    .timer.warning { color: var(--warn); }
    .timer.danger { color: var(--danger); }

    /* Replace harsh blinking with a soft pulsing glow */
    .timer.pulse {
      animation: timerPulse 900ms infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes timerPulse {
      0% { text-shadow: 0 6px 18px rgba(255,138,153,0.06), 0 0 0 rgba(0,0,0,0); transform: scale(1); }
      50% { text-shadow: 0 10px 36px rgba(255,138,153,0.12), 0 0 24px rgba(255,138,153,0.06); transform: scale(1.02); }
      100% { text-shadow: 0 6px 18px rgba(255,138,153,0.06), 0 0 0 rgba(0,0,0,0); transform: scale(1); }
    }

    .ov-onevone,
    .ov-maps,
    .ov-fourvone,
    .ov-winstreak,
    .ov-queue,
    .ov-bamboozle {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      padding: 0;
      display: flex;
    }

    .ov-onevone {
      align-items: center;
      justify-content: center;
    }

    .ov-winstreak {
      align-items: center;
      justify-content: center;
    }

    .ov-queue {
      align-items: stretch;
      justify-content: center;
    }

    .ov-bamboozle {
      align-items: center;
      justify-content: center;
      --bam-accent: #e0543e;
      --bam-text: #ffffff;
      --bam-warn: #ffb37e;
    }

    .bam-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
      min-width: 160px;
      animation: bamFadeIn 0.35s ease-out;
    }

    .bam-ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bam-ring-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 160px;
      height: 160px;
      filter: drop-shadow(0 0 6px rgba(224,84,62,0.25));
    }

    .bam-ring-fill {
      transition: stroke-dashoffset 100ms linear;
    }

    .bam-ring-icon {
      width: 130px;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      overflow: hidden;
    }

    .bam-running .bam-ring-icon {
      animation: bamIconPulse 2s ease-in-out infinite;
    }

    .bam-ring-icon .bam-perk-icon {
      width: 130px;
      height: 130px;
      object-fit: contain;
    }

    .bam-timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--bam-text);
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      text-align: center;
      line-height: 1.3;
      animation: bamFadeIn 0.3s ease-out;
    }

    .bam-count {
      font-size: 38px;
      font-weight: 800;
      display: inline-block;
    }

    .bam-count.bam-warning {
      color: var(--bam-warn);
      animation: bamWarnPulse 0.5s ease-in-out infinite alternate;
    }

    .bam-unit {
      font-size: 18px;
      font-weight: 500;
      opacity: 0.6;
      margin-left: 1px;
    }

    .bam-timer.bam-ready {
      font-size: 32px;
      font-weight: 900;
      color: var(--bam-accent);
      text-shadow: 0 0 20px rgba(224,84,62,0.5), 0 2px 12px rgba(0,0,0,0.7);
      animation: bamReadyPulse 0.8s ease-in-out infinite alternate;
      letter-spacing: 3px;
    }

    .bam-timer.bam-idle {
      font-size: 16px;
      opacity: 0.5;
    }

    .ov-bamboozle.bam-complete .bam-ring-fill {
      transition: stroke-dashoffset 400ms ease-out;
    }

    @keyframes bamFadeIn {
      0% { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes bamIconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes bamReadyPulse {
      0% { transform: scale(1); opacity: 0.85; text-shadow: 0 0 12px rgba(224,84,62,0.3), 0 2px 12px rgba(0,0,0,0.7); }
      100% { transform: scale(1.06); opacity: 1; text-shadow: 0 0 28px rgba(224,84,62,0.6), 0 2px 12px rgba(0,0,0,0.7); }
    }

    @keyframes bamWarnPulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.07); opacity: 1; }
    }

    .queue-wrap {
      width: min(100%, 1100px);
      margin: 0 auto;
      display: grid;
      gap: 16px;
      padding: 28px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(12,16,28,0.92), rgba(8,10,18,0.88));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 26px 60px rgba(0,0,0,0.34);
      backdrop-filter: blur(18px);
    }

    .queue-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .queue-title {
      font-size: calc(32px * var(--ui-scale));
      font-weight: 800;
      letter-spacing: 0.6px;
      color: var(--text);
    }

    .queue-subtitle {
      margin-top: 6px;
      font-size: calc(14px * var(--ui-scale));
      color: var(--text-dim);
    }

    .queue-count {
      flex-shrink: 0;
      min-width: 84px;
      padding: 14px 18px;
      border-radius: 18px;
      text-align: center;
      font-size: calc(28px * var(--ui-scale));
      font-weight: 800;
      color: #fff;
      background: linear-gradient(180deg, rgba(71,164,255,0.96), rgba(44,123,255,0.82));
      box-shadow: 0 12px 28px rgba(44,123,255,0.28);
    }

    .queue-count span {
      display: block;
      font-size: calc(11px * var(--ui-scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.82;
    }

    .queue-message {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-dim);
      font-size: calc(14px * var(--ui-scale));
      line-height: 1.5;
    }

    .queue-list {
      display: grid;
      gap: 10px;
    }

    .queue-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.06);
    }

    .queue-row-name {
      font-size: calc(18px * var(--ui-scale));
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .queue-row-index {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: calc(13px * var(--ui-scale));
      font-weight: 800;
      color: #dbe8ff;
      background: rgba(71,164,255,0.18);
      border: 1px solid rgba(71,164,255,0.28);
    }

    .queue-empty {
      padding: 18px 16px;
      border-radius: 16px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.12);
      text-align: center;
      font-size: calc(14px * var(--ui-scale));
    }

    .onevone-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--space-lg));
      gap: calc(var(--space-lg));
    }

    .onevone-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto;
      align-items: center;
      width: 100%;
      gap: 24px;
    }

    .player-section {
      flex: 1;
      text-align: left;
      display: grid;
      gap: 8px;
    }

    .player-name {

      padding: 5px 8px;

      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transform-origin: center bottom;
      transform: translateY(8px) scale(0.92);
      opacity: 0;
      animation: badgePop 420ms cubic-bezier(.22,.9,.28,1) forwards;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      position: relative;
      overflow: hidden;

      background: linear-gradient(90deg, rgba(127,149,255,0.16), rgba(118,197,182,0.08));
      border: 1px solid rgba(var(--appearance-border-rgb2, 127,149,255), calc(0.22 * var(--overlay-bg-alpha)));
      box-shadow: 0 8px 28px rgba(127,149,255,0.08);

      border: 1px solid rgba(var(--appearance-border-rgb, 155,131,255), calc(0.18 * var(--overlay-bg-alpha)));
      box-shadow: 0 8px 28px rgba(155,131,255,0.06);

    /* medal icon inside badge */
    .winstreak-badge .badge-icon { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; margin-right:6px; }
    .winstreak-badge .badge-icon svg { width:18px; height:18px; display:block; }
    .winstreak-badge.pb { color: var(--silver-1); }
    .winstreak-badge.pb .badge-icon svg { filter: drop-shadow(0 6px 12px rgba(170,184,255,0.12)); }
    .winstreak-badge.wr { color: var(--gold-1); }
    .winstreak-badge.wr .badge-icon svg { filter: drop-shadow(0 8px 18px rgba(255,184,77,0.12)); }

    .winstreak-badge .badge-shine {
      position: absolute;
      top: 0; bottom: 0; left: -40%; width: 40%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.22), rgba(255,255,255,0));
      transform: skewX(-18deg) translateX(0);
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.9;
      animation: badgeShine 1.6s ease-in-out infinite;
    }

    @keyframes badgeShine {
      0% { transform: skewX(-18deg) translateX(-120%); }
      50% { transform: skewX(-18deg) translateX(120%); }
      100% { transform: skewX(-18deg) translateX(360%); }
    }

    @keyframes badgePop {
      0% { transform: translateY(8px) scale(0.88); opacity: 0; }
      60% { transform: translateY(-6px) scale(1.05); opacity: 1; }

    /* Motion reduction */

      .winstreak-badge,

      .overlay-shell {
        animation: none !important;
        transition: none !important;
      }
      .winstreak-badge { transform: none; opacity: 1; }

    /* Overlay transition animations: leave + enter (crossfade + slide + subtle blur) */
    .overlay-leave {
      animation: overlayLeave 260ms ease-in forwards;

    .overlay-enter {

    @keyframes overlayLeave {
      0% { opacity: 1; transform: translateY(0) scale(1); filter: none; }
      100% { opacity: 0; transform: translateY(-8px) scale(0.996); filter: blur(4px) saturate(0.9); }
    }

    @keyframes overlayEnterIn {
      0% { opacity: 0; transform: translateY(8px) scale(0.992); filter: blur(6px) saturate(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: none; }

        radial-gradient(circle at 78% 80%, rgba(118,197,182,0.16), transparent 30%),
        linear-gradient(180deg, rgba(14, 16, 22, 0.96), rgba(8, 10, 14, 0.94));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 42px rgba(0,0,0,0.34);
    }

    .winstreak-card-name,
    .winstreak-banner-name {
      color: #fff;
      font-size: clamp(26px, 4.8vw, 44px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .winstreak-card-count {
      display: flex;
      align-items: baseline;
      gap: 6px;
      color: #fff;
      font-size: clamp(40px, 7vw, 74px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.04em;
    }

    .winstreak-card-count span,
    .winstreak-banner-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .winstreak-card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .winstreak-banner {
      min-width: min(920px, 96vw);
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 18px;
      align-items: center;
      padding: 18px 20px;
      border-radius: 26px;
      background:
        linear-gradient(90deg, rgba(10, 12, 16, 0.96), rgba(10, 12, 16, 0.82)),
        radial-gradient(circle at 20% 30%, rgba(245,197,24,0.12), transparent 26%),
        radial-gradient(circle at 76% 72%, rgba(118,197,182,0.14), transparent 28%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 42px rgba(0,0,0,0.34);

    .winstreak-banner-copy {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .winstreak-banner-stats {
      display: flex;
      align-items: baseline;
      gap: 8px;

    .winstreak-banner-count {
      color: #fff;
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.05em;
    }

    @keyframes pillGlow {
      0%, 100% { opacity: 0.72; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.01); }
    }

    @keyframes modelFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(-1deg); }
    }

    @keyframes modelBob {
      0%, 100% { transform: translateY(0) scale(1.08); }
      50% { transform: translateY(-2px) scale(1.12); }
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 14px rgba(255,255,255,0.06); }
      50% { text-shadow: 0 0 18px rgba(245,197,24,0.12); }
    }

    @keyframes winstreakRise {
      from { opacity: 0; transform: translateY(8px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }

  </style>
</head>
<body>
  <div id="overlay-root">
    <div class="resize-handle edge-n"></div>
    <div class="resize-handle edge-s"></div>
    <div class="resize-handle edge-e"></div>
    <div class="resize-handle edge-w"></div>
    <div class="resize-handle corner-ne"></div>
    <div class="resize-handle corner-nw"></div>
    <div class="resize-handle corner-se"></div>
    <div class="resize-handle corner-sw"></div>
    <div class="overlay-watermark">VD-OverlayTool</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const overlayTypeArg = process.argv.find(arg => arg.startsWith('--overlay-type=')) || '--overlay-type=maps';
    const overlayType = overlayTypeArg.split('=')[1] || 'maps';

    const state = {
      type: overlayType,
      data: null,
      overlayState: null,
    };

    let userUiScale = 1;
    let dpiScaleFactor = 1;

    function applyOverlayUiScale() {
      const effectiveScale = Number(userUiScale || 1);
      document.documentElement.style.setProperty('--ui-scale', String(effectiveScale));
    }

    applyOverlayUiScale();

    ipcRenderer.on('ui-scale-changed', (event, scale) => {
      const next = Number(scale) || 1;
      if (!Number.isFinite(next) || next <= 0) return;
      userUiScale = next;
      applyOverlayUiScale();
    });

    ipcRenderer.on('dpi-scale-changed', (event, scale) => {
      const next = Number(scale) || 1;
      if (!Number.isFinite(next) || next <= 0) return;
      dpiScaleFactor = next;
      applyOverlayUiScale();
    });

    ipcRenderer.on('overlay-data', (event, payload) => {
      try {
        if (payload && payload.type && payload.type !== state.type) return;
        if (payload && Object.prototype.hasOwnProperty.call(payload, 'state')) {
          state.overlayState = payload.state;
        }
        if (payload && Object.prototype.hasOwnProperty.call(payload, 'data')) {
          state.data = payload.data;
        } else if (payload && (Object.prototype.hasOwnProperty.call(payload, 'ladder') || Object.prototype.hasOwnProperty.call(payload, 'winstreak') || Object.prototype.hasOwnProperty.call(payload, 'fourvone') || Object.prototype.hasOwnProperty.call(payload, 'maps') || Object.prototype.hasOwnProperty.call(payload, 'queue') || Object.prototype.hasOwnProperty.call(payload, 'bamboozle'))) {
          state.data = payload;
        }
        applyOverlayCustomizations(payload);
        if (state.type === 'onevone') {
          if (!onevoneLocal.inited) {
            onevoneLocal.inited = true;
            render();
            initOnevoneLocalState(state.data);
            updateOnevoneDom();
            if (onevoneLocal.timerRunning) startOnevoneLoop();
          } else {
            initOnevoneLocalState(state.data);
            updateOnevoneDom();
            if (onevoneLocal.timerRunning) startOnevoneLoop();
          }
        } else if (state.type === 'bamboozle') {
          if (!bamLocal.inited) {
            bamLocal.inited = true;
            render();
            initBamFromData(state.data);
            updateBamDom();
          } else {
            initBamFromData(state.data);
            updateBamDom();
          }
        } else {
          render();
        }
      } catch (err) {
        console.error('overlay-data handler failed', err);
      }
    });

    ipcRenderer.on('onevone-command', (event, cmd) => {
      if (state.type !== 'onevone') return;
      if (!onevoneLocal.inited) return;
      handleOnevoneCommand(cmd);
      updateOnevoneDom();
    });

    // ── Bamboozle local timer management ──
    const bamLocal = { running: false, remaining: 0, duration: 16, image: '', inited: false, rafId: null, lastUpdate: 0 };

    function initBamFromData(data) {
      const d = data && data.bamboozle ? data.bamboozle : data || {};
      if (d.duration !== undefined) bamLocal.duration = d.duration;
      if (d.image !== undefined) bamLocal.image = d.image;
      if (d.remaining !== undefined) bamLocal.remaining = d.remaining;
      if (d.running !== undefined) {
        bamLocal.running = !!d.running;
        if (bamLocal.running) { bamLocal.lastUpdate = performance.now(); startBamRaf(); }
        else { stopBamRaf(); }
      }
    }

    function startBamRaf() {
      if (bamLocal.rafId) return;
      bamLocal.lastUpdate = performance.now();
      bamLocal._lastFrame = 0;
      const FRAME_MS = 1000 / 30;
      function tick(ts) {
        bamLocal.rafId = requestAnimationFrame(tick);
        const now = performance.now();
        const dt = (now - bamLocal.lastUpdate) / 1000;
        bamLocal.lastUpdate = now;
        bamLocal.remaining = Math.max(0, bamLocal.remaining - dt);
        if (ts - bamLocal._lastFrame >= FRAME_MS) {
          bamLocal._lastFrame = ts;
          updateBamDom();
        }
        if (bamLocal.remaining <= 0) {
          bamLocal.running = false;
          stopBamRaf();
          updateBamDom();
        }
      }
      bamLocal.rafId = requestAnimationFrame(tick);
      updateBamDom();
    }

    function stopBamRaf() {
      if (bamLocal.rafId) { cancelAnimationFrame(bamLocal.rafId); bamLocal.rafId = null; }
    }

    function updateBamDom() {
      const root = document.getElementById('overlay-root');
      if (!root) return;
      const section = root.querySelector('.ov-bamboozle');
      if (!section) return;
      const ready = !bamLocal.running && bamLocal.remaining <= 0;
      const progress = bamLocal.duration > 0 ? Math.min(1, Math.max(0, bamLocal.remaining / bamLocal.duration)) : 0;
      const circumference = 400;
      const dashoffset = circumference * (1 - progress);
      const ring = section.querySelector('.bam-ring-fill');
      if (ring) ring.setAttribute('stroke-dashoffset', dashoffset);
      const timerDiv = section.querySelector('.bam-timer');
      if (timerDiv) {
        if (ready) {
          timerDiv.className = 'bam-timer bam-ready';
          timerDiv.textContent = 'READY';
        } else if (bamLocal.running) {
          timerDiv.className = 'bam-timer';
          const warn = bamLocal.remaining <= 3;
          timerDiv.innerHTML = '<span class="bam-count' + (warn ? ' bam-warning' : '') + '">' + bamLocal.remaining.toFixed(1) + '<span class="bam-unit">s</span></span>';
        } else {
          timerDiv.className = 'bam-timer bam-idle';
          timerDiv.textContent = 'PAUSED';
        }
      }
      const iconDiv = section.querySelector('.bam-ring-icon');
      if (iconDiv) {
        const img = iconDiv.querySelector('.bam-perk-icon');
        if (bamLocal.image) {
          if (!img) iconDiv.innerHTML = '<img class="bam-perk-icon" src="' + bamLocal.image + '" alt="">';
          else if (img.src !== bamLocal.image) img.src = bamLocal.image;
        } else {
          if (img) img.remove();
        }
      }
      section.classList.toggle('bam-complete', ready);
      section.classList.toggle('bam-running', bamLocal.running);
    }

    ipcRenderer.on('bamboozle-command', (event, cmd) => {
      if (state.type !== 'bamboozle') return;
      if (!bamLocal.inited) {
        bamLocal.inited = true;
        if (cmd.duration !== undefined) bamLocal.duration = cmd.duration;
        if (cmd.image !== undefined) bamLocal.image = cmd.image;
        bamLocal.remaining = cmd.remaining || 0;
        render();
      }
      switch (cmd.action) {
        case 'start':
          if (cmd.duration !== undefined) bamLocal.duration = cmd.duration;
          if (cmd.image !== undefined) bamLocal.image = cmd.image;
          if (cmd.remaining !== undefined) bamLocal.remaining = cmd.remaining;
          bamLocal.running = true;
          bamLocal.lastUpdate = performance.now();
          startBamRaf();
          break;
        case 'pause':
          bamLocal.running = false;
          stopBamRaf();
          if (cmd.remaining !== undefined) bamLocal.remaining = cmd.remaining;
          break;
        case 'reset':
          bamLocal.running = false;
          stopBamRaf();
          bamLocal.remaining = 0;
          break;
        case 'complete':
          bamLocal.running = false;
          stopBamRaf();
          bamLocal.remaining = 0;
          break;
      }
      updateBamDom();
    });

    function applyOverlayCustomizations(payload) {
      if (!payload) return;
      const overlay = document.getElementById('overlay-root');
      if (!overlay) return;

      // Watermark
      const wm = overlay.querySelector('.overlay-watermark');
      if (wm && Object.prototype.hasOwnProperty.call(payload, 'showWatermark')) {
        wm.classList.toggle('show', !!payload.showWatermark);
      }

      // Banner/text watermark content
      if (wm && Object.prototype.hasOwnProperty.call(payload, 'watermarkText')) {
        wm.textContent = payload.watermarkText || '';
      }

      // Overlay border customization
      if (Object.prototype.hasOwnProperty.call(payload, 'borderColor')) {
        document.documentElement.style.setProperty('--overlay-border-color', payload.borderColor);
      }
      if (Object.prototype.hasOwnProperty.call(payload, 'borderWidth')) {
        document.documentElement.style.setProperty('--overlay-border-width', payload.borderWidth + 'px');
      }
      if (Object.prototype.hasOwnProperty.call(payload, 'borderRadius')) {
        document.documentElement.style.setProperty('--overlay-radius', payload.borderRadius + 'px');
      }

      // Team colors for scrim
      if (Object.prototype.hasOwnProperty.call(payload, 'team1Color')) {
        document.documentElement.style.setProperty('--team-1-color', payload.team1Color);
      }
      if (Object.prototype.hasOwnProperty.call(payload, 'team2Color')) {
        document.documentElement.style.setProperty('--team-2-color', payload.team2Color);
      }

      // Portrait glow
      const portraits = overlay.querySelectorAll('.killer-portrait');
      if (portraits.length && Object.prototype.hasOwnProperty.call(payload, 'streakLevel')) {
        portraits.forEach(p => {
          p.classList.remove('streak-low', 'streak-med', 'streak-high');
          if (payload.streakLevel === 'low') p.classList.add('streak-low');
          else if (payload.streakLevel === 'med') p.classList.add('streak-med');
          else if (payload.streakLevel === 'high') p.classList.add('streak-high');
        });
      }
    }

    function applyTimerRing(element, timerSeconds, totalSeconds) {
      if (!element) return;
      let wrap = element.querySelector('.timer-ring-wrap');
      if (!wrap) {
        wrap = document.createElement('span');
        wrap.className = 'timer-ring-wrap';
        wrap.innerHTML = `<svg class="timer-ring-svg" viewBox="0 0 40 40">
          <circle class="timer-ring-bg" cx="20" cy="20" r="17"/>
          <circle class="timer-ring-fg" cx="20" cy="20" r="17" stroke-dasharray="106.8" stroke-dashoffset="0"/>
        </svg>`;
        element.insertBefore(wrap, element.firstChild);
      }
      const fg = wrap.querySelector('.timer-ring-fg');
      if (fg) {
        const circumference = 2 * Math.PI * 17;
        const total = Number(totalSeconds) || 120;
        const remaining = Math.max(0, Math.min(Number(timerSeconds) || 0, total));
        const offset = circumference * (1 - remaining / total);
        fg.style.strokeDashoffset = String(offset);
      }
    }

    function toFileUrl(value) {
      if (!value) return '';
      if (/^(https?:|file:)/i.test(value)) return value;
      const normalized = value.replace(/\\/g, '/');
      return normalized.startsWith('/') ? `file://${normalized}` : `file:///${normalized}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function hashString(value) {
      const input = String(value || '0');
      let hash = 0;
      for (let i = 0; i < input.length; i += 1) {
        hash = ((hash << 5) - hash) + input.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function makeAvatarDataUri(seedText, seedValue) {
      const seed = String(seedValue || seedText || '0');
      const hue = hashString(seed) % 360;
      const hue2 = (hue + 42) % 360;
      const hue3 = (hue + 84) % 360;
      const initial = escapeHtml(String(seedText || '?').trim().charAt(0).toUpperCase() || '?');
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Avatar: ${initial}">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="hsl(${hue} 72% 48%)"/>
              <stop offset="50%" stop-color="hsl(${hue2} 68% 35%)"/>
              <stop offset="100%" stop-color="hsl(${hue3} 60% 22%)"/>
            </linearGradient>
            <linearGradient id="h" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
            <filter id="s">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
            </filter>
          </defs>
          <rect width="96" height="96" rx="48" fill="url(#g)"/>
          <circle cx="48" cy="48" r="32" fill="url(#h)"/>
          <circle cx="48" cy="48" r="30" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          <text x="48" y="58" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="34" font-weight="700" fill="#fff" filter="url(#s)">${initial}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }


    function timerClass(section) {
      if (!section || !section.timerRunning) return 'timer';
      if (section.timerSeconds <= 10) return 'timer danger';
      if (section.timerSeconds <= 30) return 'timer warning';
      return 'timer running';
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60).toString().padStart(2, '0');
      const remaining = (seconds % 60).toString().padStart(2, '0');
      return `${minutes}:${remaining}`;
    }

    function formatMillisDynamic(ms) {
      const total = Math.max(0, Math.floor(Number(ms) || 0));
      const cs = Math.floor((total % 1000) / 10);
      const secs = Math.floor(total / 1000) % 60;
      const mins = Math.floor(total / 60000);
      const cs2 = String(cs).padStart(2, '0');

      if (mins > 0) {
        return `${mins}:${String(secs).padStart(2, '0')}.${cs2}`;
      }

      return `${secs}.${cs2}`;
    }

    // ===== Onevone local timer =====
    class OverlayPreciseTimer {
      constructor() { this._running = false; this._startedAt = 0; this._accum = 0; }
      start() { if (this._running) return; this._startedAt = performance.now(); this._running = true; }
      pause() { if (!this._running) return; this._accum += performance.now() - this._startedAt; this._running = false; }
      reset() { this._running = false; this._accum = 0; this._startedAt = 0; }
      setElapsedMs(ms) { this._accum = Math.max(0, Number(ms) || 0); this._startedAt = this._running ? performance.now() : 0; }
      get running() { return this._running; }
      get elapsedMs() { return this._running ? this._accum + (performance.now() - this._startedAt) : this._accum; }
    }

    const onevoneLocal = {
      timers: { 1: new OverlayPreciseTimer(), 2: new OverlayPreciseTimer() },
      activeTimer: 1,
      timerRunning: false,
      player1Name: 'Player 1',
      player2Name: 'Player 2',
      player1Score: 0,
      player2Score: 0,
      player1Finished: false,
      player2Finished: false,
      rafId: null,
      inited: false,
    };

    function writeTimerChars(element, formatted) {
      if (!element) return;
      const chars = [...formatted];
      let children = element.children;
      // Ensure correct number of child spans
      while (children.length < chars.length) {
        const span = document.createElement('span');
        span.className = 'timer-char';
        element.appendChild(span);
      }
      while (children.length > chars.length) {
        element.removeChild(element.lastChild);
      }
      children = element.children;
      for (let i = 0; i < chars.length; i++) {
        const ch = chars[i];
        const span = children[i];
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        if (ch === ':' || ch === '.') {
          span.className = 'timer-char timer-sep';
        } else {
          span.className = 'timer-char';
        }
      }
    }

    function initOnevoneLocalState(data) {
      // data may be the IPC payload (with nested .data) or getData() output (with .onevone) or a plain onevone object
      const raw = data || getData() || {};
      const inner = raw.data && typeof raw.data === 'object' && !raw.data.onevone && !raw.player1Name ? raw.data : raw;
      const o = inner && inner.onevone ? inner.onevone : inner;
      onevoneLocal.player1Name = o.player1Name || 'Player 1';
      onevoneLocal.player2Name = o.player2Name || 'Player 2';
      onevoneLocal.player1Score = Number(o.player1Score || 0);
      onevoneLocal.player2Score = Number(o.player2Score || 0);
      onevoneLocal.player1Finished = !!o.player1Finished;
      onevoneLocal.player2Finished = !!o.player2Finished;
      onevoneLocal.activeTimer = Number(o.activeTimer || 1) === 2 ? 2 : 1;
      onevoneLocal.timerRunning = !!o.timerRunning;
      const p1elapsed = Number(o.player1ElapsedMs ?? o.player1Seconds * 1000) || 0;
      const p2elapsed = Number(o.player2ElapsedMs ?? o.player2Seconds * 1000) || 0;
      onevoneLocal.timers[1].setElapsedMs(p1elapsed);
      onevoneLocal.timers[2].setElapsedMs(p2elapsed);
      if (onevoneLocal.timerRunning) {
        onevoneLocal.timers[onevoneLocal.activeTimer].start();
      }
    }

    function updateOnevoneDom() {
      const p1e = document.getElementById('ov-timer-1');
      const p2e = document.getElementById('ov-timer-2');
      if (p1e) {
        const v = formatMillisDynamic(onevoneLocal.timers[1].elapsedMs);
        writeTimerChars(p1e, v);
        const side = p1e.closest('.onevone-side');
        if (side) {
          const isActive = onevoneLocal.activeTimer === 1 && onevoneLocal.timerRunning;
          side.classList.toggle('running', isActive);
        }
      }
      if (p2e) {
        const v = formatMillisDynamic(onevoneLocal.timers[2].elapsedMs);
        writeTimerChars(p2e, v);
        const side = p2e.closest('.onevone-side');
        if (side) {
          const isActive = onevoneLocal.activeTimer === 2 && onevoneLocal.timerRunning;
          side.classList.toggle('running', isActive);
        }
      }
      const pill = document.getElementById('ov-score-pill');
      if (pill) pill.textContent = `${onevoneLocal.player1Score} - ${onevoneLocal.player2Score}`;
      const n1 = document.getElementById('ov-p1-name');
      const n2 = document.getElementById('ov-p2-name');
      if (n1) n1.textContent = onevoneLocal.player1Name;
      if (n2) n2.textContent = onevoneLocal.player2Name;
      const footer = document.getElementById('ov-footer-status');
      if (footer) {
        if (onevoneLocal.timerRunning) {
          const label = onevoneLocal.activeTimer === 2 ? onevoneLocal.player2Name : onevoneLocal.player1Name;
          footer.textContent = `Currently running: ${label}`;
        } else {
          footer.textContent = 'Paused';
        }
      }
      const fplayers = document.getElementById('ov-footer-players');
      if (fplayers) {
        fplayers.textContent = `${onevoneLocal.player1Finished ? 'P1 done' : 'P1 live'} / ${onevoneLocal.player2Finished ? 'P2 done' : 'P2 live'}`;
      }
    }

    const ONEVONE_FPS = 30;
    const onevoneFrameInterval = 1000 / ONEVONE_FPS;

    function onevoneTick(ts) {
      if (!onevoneLocal.timerRunning) return;
      if (ts - onevoneLocal._lastFrame >= onevoneFrameInterval) {
        onevoneLocal._lastFrame = ts;
        updateOnevoneDom();
      }
      onevoneLocal.rafId = requestAnimationFrame(onevoneTick);
    }

    function startOnevoneLoop() {
      if (onevoneLocal.rafId) cancelAnimationFrame(onevoneLocal.rafId);
      onevoneLocal._lastFrame = 0;
      onevoneLocal.rafId = requestAnimationFrame(onevoneTick);
    }

    function stopOnevoneLoop() {
      if (onevoneLocal.rafId) {
        cancelAnimationFrame(onevoneLocal.rafId);
        onevoneLocal.rafId = null;
      }
    }

    function handleOnevoneCommand(cmd) {
      if (!cmd || typeof cmd !== 'object') return;
      const { command, player } = cmd;
      if (command === 'start') {
        const p = player === 2 ? 2 : 1;
        onevoneLocal.activeTimer = p;
        onevoneLocal.timers[p].start();
        onevoneLocal.timerRunning = true;
        startOnevoneLoop();
      } else if (command === 'pause') {
        onevoneLocal.timers[1].pause();
        onevoneLocal.timers[2].pause();
        onevoneLocal.timerRunning = false;
        stopOnevoneLoop();
      } else if (command === 'reset') {
        stopOnevoneLoop();
        onevoneLocal.timers[1].reset();
        onevoneLocal.timers[2].reset();
        onevoneLocal.activeTimer = 1;
        onevoneLocal.timerRunning = false;
        onevoneLocal.player1Finished = false;
        onevoneLocal.player2Finished = false;
      } else if (command === 'switch') {
        const next = onevoneLocal.activeTimer === 1 ? 2 : 1;
        if (onevoneLocal.timerRunning) {
          onevoneLocal.timers[onevoneLocal.activeTimer].pause();
          onevoneLocal.timers[next].start();
        }
        onevoneLocal.activeTimer = next;
      } else if (command === 'finish') {
        const p = player === 2 ? 2 : 1;
        if (p === 1) onevoneLocal.player1Finished = true;
        if (p === 2) onevoneLocal.player2Finished = true;
        if (onevoneLocal.timerRunning) {
          const other = p === 1 ? 2 : 1;
          if (!(p === 1 ? onevoneLocal.player2Finished : onevoneLocal.player1Finished)) {
            onevoneLocal.timers[p].pause();
            onevoneLocal.timers[other].start();
            onevoneLocal.activeTimer = other;
          }
          if (onevoneLocal.player1Finished && onevoneLocal.player2Finished) {
            onevoneLocal.timers[1].pause();
            onevoneLocal.timers[2].pause();
            onevoneLocal.timerRunning = false;
            stopOnevoneLoop();
          }
        }
      } else if (command === 'sync') {
        initOnevoneLocalState(cmd);
        updateOnevoneDom();
        if (onevoneLocal.timerRunning) startOnevoneLoop();
      }
    }

      const survivorProgress = (() => {

                    <circle cx="18" cy="18" r="4" fill="currentColor" opacity="0.55"/>

      if (survivorMode) {
        if (style === 'compact') return survivorCompact;

        if (style === 'progress') return survivorProgress;

    function renderLadder() {
      return `
        <section class="overlay-shell ov-ladder">
          <div class="safe-zone"></div>
          <div class="ladder-rework-shell">
            <div class="ladder-rework-card" role="status" aria-live="polite">
              <div class="ladder-rework-title">Under Rework</div>
              <div class="ladder-rework-subtitle">This ladder overlay is currently being reworked. Check the VD OverlayTools Discord for more updates while we finish the new version.</div>
              <div class="ladder-rework-pill">Animated placeholder active</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderBamboozle() {
      const data = getData() || {};
      const bam = data.bamboozle || data;
      const image = bam.image || '';
      const duration = bam.duration || 16;
      const running = bam.running || false;
      const remaining = bam.remaining !== undefined ? bam.remaining : 0;
      const ready = !running && remaining <= 0;
      const progress = duration > 0 ? Math.min(1, Math.max(0, remaining / duration)) : 0;
      const circumference = 400;
      const dashoffset = circumference * (1 - progress);
      return `<section class="overlay-shell ov-bamboozle ${ready ? 'bam-complete' : ''}">
          <div class="bam-container">
            <div class="bam-ring-wrap">
              <svg class="bam-ring-svg" viewBox="0 0 140 140" aria-hidden="true">
                <circle cx="70" cy="70" r="64" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
                <circle class="bam-ring-fill" cx="70" cy="70" r="64" fill="none" stroke="var(--bam-accent, #e0543e)" stroke-width="5" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${dashoffset}" transform="rotate(-90 70 70)"/>
              </svg>
              <div class="bam-ring-icon">${image ? `<img class="bam-perk-icon" src="${image}" alt="">` : '<span style="font-size:64px">🧱</span>'}</div>
            </div>
            ${ready ? '<div class="bam-timer bam-ready">READY</div>' : running ? `<div class="bam-timer"><span class="bam-count${remaining <= 3 ? ' bam-warning' : ''}">${remaining.toFixed(1)}<span class="bam-unit">s</span></span></div>` : '<div class="bam-timer bam-idle">PAUSED</div>'}
          </div>
        </section>
      `;
    }

    function renderQueue() {
      const data = getData();
      const queue = data || {};
      const title = queue.title || 'Queue';
      const players = Array.isArray(queue.players) ? queue.players : [];
      const visiblePlayers = players.slice(0, Math.max(1, Number(queue.maxVisible || 8)));
      const message = queue.message || (queue.ok ? 'Queue is live.' : 'Queue data is unavailable.');
      const count = Number(queue.count ?? players.length ?? 0);

      const rows = visiblePlayers.length
        ? visiblePlayers.map((player, index) => `
            <div class="queue-row">
              <div class="queue-row-name">${escapeHtml(player.name || `Player ${index + 1}`)}</div>
              <div class="queue-row-index">${escapeHtml(String(player.index || index + 1))}</div>
            </div>
          `).join('')
        : `<div class="queue-empty">${escapeHtml(queue.ok ? 'No one is in queue right now.' : message)}</div>`;

      return `
        <section class="overlay-shell ov-queue">
          <div class="safe-zone"></div>
          <div class="preview-hud" id="preview-hud" style="display:none">
            <button class="ph-btn" id="ph-toggle-preview">Toggle Preview</button>
            <button class="ph-btn" id="ph-screenshot">Screenshot</button>
          </div>
          <div class="queue-wrap">
            <div class="queue-header">
              <div>
                <div class="queue-title">${escapeHtml(title)}</div>
                <div class="queue-subtitle">NeatQueue live roster</div>
              </div>
              <div class="queue-count">${escapeHtml(String(count))}<span>Players</span></div>
            </div>
            <div class="queue-message">${escapeHtml(message)}</div>
            <div class="queue-list">
              ${rows}
            </div>
          </div>
        </section>
      `;
    }

    function render() {
      const root = document.getElementById('overlay-root');
      if (!root) return;
      performRenderWithTransition(() => {
        // Store resize handles before clearing
        const resizeHandles = root.querySelectorAll('.resize-handle');
        const handlesHTML = Array.from(resizeHandles).map(h => h.outerHTML).join('');
        // Preserve watermark
        const wm = root.querySelector('.overlay-watermark');
        const wmHTML = wm ? wm.outerHTML : '';

        let html;
        if (state.type === 'onevone') {
          html = renderOnevone();
        } else {
          html = {
            maps: renderMaps(),
            fourvone: renderFourvone(),
            queue: renderQueue(),
            winstreak: renderWinstreak(),
            ladder: renderLadder(),
            bamboozle: renderBamboozle(),
          }[state.type] || `<div class="overlay-shell overlay-empty">Overlay type unavailable</div>`;
        }

        root.innerHTML = html;
        // Re-insert resize handles
        if (handlesHTML) {
          root.insertAdjacentHTML('beforeend', handlesHTML);
        } else {
          const handles = [
            '<div class="resize-handle edge-n"></div>',
            '<div class="resize-handle edge-s"></div>',
            '<div class="resize-handle edge-e"></div>',
            '<div class="resize-handle edge-w"></div>',
            '<div class="resize-handle corner-ne"></div>',
            '<div class="resize-handle corner-nw"></div>',
            '<div class="resize-handle corner-se"></div>',
            '<div class="resize-handle corner-sw"></div>',
          ];
          root.insertAdjacentHTML('beforeend', handles.join(''));
        }
        // Re-insert watermark
        if (wmHTML) {
          root.insertAdjacentHTML('beforeend', wmHTML);
        }
      });
      
      // after DOM is rendered, initialize controls
      initMapControls();
      initResizeHandles();
      initDragHandle();
      // Apply map crossfade on image change
      applyMapCrossfade();
    }

    function applyMapCrossfade() {
      const img = document.getElementById('maps-img');
      if (!img) return;
      img.classList.remove('map-image-enter', 'map-image-exit');
      // Force reflow
      void img.offsetWidth;
      img.classList.add('map-image-enter');
    }

    // Perform a leave -> insert -> enter transition when re-rendering overlays
    function performRenderWithTransition(renderFn) {
      const root = document.getElementById('overlay-root');
      if (!root) return;
      renderFn();
      const newShell = root.querySelector('.overlay-shell');
      postRenderInit(newShell || null);
    }

    // After DOM insertion, apply staggered badge delays and any necessary inits
    function postRenderInit(shell) {
      // stagger badges
      const badges = document.querySelectorAll('.winstreak-badges .winstreak-badge');
      badges.forEach((b, i) => {
        b.style.animationDelay = `${i * 100}ms`;
        b.style.opacity = '';
      });

      const progressFills = document.querySelectorAll('[data-progress-target]');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      progressFills.forEach(fill => {
        const target = Number(fill.dataset.progressTarget || 0);
        const circumference = Number(fill.dataset.progressCircumference || 0);
        const widthTarget = fill.classList.contains('winstreak-progress-fill') ? target : null;
        if (circumference > 0) {
          fill.style.strokeDasharray = `${circumference}`;
          fill.style.strokeDashoffset = `${circumference}`;
        }
        const targetOffset = circumference > 0 ? circumference - (target / 100) * circumference : 0;
        if (reduceMotion) {
          fill.style.transition = 'none';
          fill.style.strokeDashoffset = `${targetOffset}`;
          if (widthTarget !== null) fill.style.width = `${Math.max(0, Math.min(100, widthTarget))}%`;
          return;
        }
        fill.style.strokeDashoffset = `${circumference}`;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fill.style.strokeDashoffset = `${targetOffset}`;
            if (widthTarget !== null) fill.style.width = `${Math.max(0, Math.min(100, widthTarget))}%`;
          });
        });
      });

      // ensure other inits run
      initMapControls();
      initResizeHandles();
      initDragHandle();
      setupHudHandlers();
      setupTooltips();
    }

    const mapControlState = {
      bound: false,
      activeHandle: null,
      startX: 0,
      startY: 0,
      startWidth: 0,
      startHeight: 0,
      startLeft: 0,
      startTop: 0,
    };

    const resizeState = {
      bound: false,
      active: null,
      startX: 0,
      startY: 0,
      startWidth: 0,
      startHeight: 0,
      pendingWidth: 0,
      pendingHeight: 0,
      rafId: 0,
    };

    const dragState = { bound: false };

    function initMapControls() {
      if (mapControlState.bound) return;
      mapControlState.bound = true;

      document.addEventListener('mousedown', (e) => {
        const handle = e.target.closest('.maps-image-handle');
        if (!handle) return;
        const img = document.getElementById('maps-img');
        if (!img) return;

        const rect = img.getBoundingClientRect();
        mapControlState.activeHandle = handle.getAttribute('data-handle') || 'br';
        mapControlState.startX = e.clientX;
        mapControlState.startY = e.clientY;
        mapControlState.startWidth = rect.width;
        mapControlState.startHeight = rect.height;
        mapControlState.startLeft = img.offsetLeft || 0;
        mapControlState.startTop = img.offsetTop || 0;
        e.preventDefault();
      }, true);

      document.addEventListener('mousemove', (e) => {
        if (!mapControlState.activeHandle) return;
        const img = document.getElementById('maps-img');
        if (!img) return;

        const dx = e.clientX - mapControlState.startX;
        const dy = e.clientY - mapControlState.startY;

        let newWidth = mapControlState.startWidth;
        let newHeight = mapControlState.startHeight;

        if (mapControlState.activeHandle.includes('l')) newWidth -= dx;
        if (mapControlState.activeHandle.includes('r')) newWidth += dx;
        if (mapControlState.activeHandle.includes('t')) newHeight -= dy;
        if (mapControlState.activeHandle.includes('b')) newHeight += dy;

        img.style.width = `${Math.max(120, Math.round(newWidth))}px`;
        img.style.height = `${Math.max(80, Math.round(newHeight))}px`;
      }, true);

      document.addEventListener('mouseup', () => {
        mapControlState.activeHandle = null;
      }, true);
    }

    function initResizeHandles() {
      if (resizeState.bound) return;
      resizeState.bound = true;

      document.addEventListener('mousedown', (e) => {
        const handle = e.target.closest('.resize-handle');
        if (!handle) return;

        resizeState.active = handle.className || 'resize-handle corner-se';
        resizeState.startX = e.clientX;
        resizeState.startY = e.clientY;
        resizeState.startWidth = window.innerWidth;
        resizeState.startHeight = window.innerHeight;
        e.preventDefault();
      }, true);

      document.addEventListener('mousemove', (e) => {
        if (!resizeState.active) return;

        const dx = e.clientX - resizeState.startX;
        const dy = e.clientY - resizeState.startY;

        let width = resizeState.startWidth;
        let height = resizeState.startHeight;

        if (resizeState.active.includes('edge-e') || resizeState.active.includes('corner-ne') || resizeState.active.includes('corner-se')) width += dx;
        if (resizeState.active.includes('edge-w') || resizeState.active.includes('corner-nw') || resizeState.active.includes('corner-sw')) width -= dx;
        if (resizeState.active.includes('edge-s') || resizeState.active.includes('corner-se') || resizeState.active.includes('corner-sw')) height += dy;
        if (resizeState.active.includes('edge-n') || resizeState.active.includes('corner-ne') || resizeState.active.includes('corner-nw')) height -= dy;

        resizeState.pendingWidth = Math.max(320, Math.round(width));
        resizeState.pendingHeight = Math.max(180, Math.round(height));

        if (!resizeState.rafId) {
          resizeState.rafId = requestAnimationFrame(() => {
            resizeState.rafId = 0;
            if (!resizeState.active) return;
            ipcRenderer.send('resize-overlay-window', resizeState.pendingWidth, resizeState.pendingHeight);
          });
        }
      }, true);

      document.addEventListener('mouseup', () => {
        if (resizeState.active && resizeState.pendingWidth && resizeState.pendingHeight) {
          ipcRenderer.send('resize-overlay-window', resizeState.pendingWidth, resizeState.pendingHeight);
        }
        if (resizeState.rafId) {
          cancelAnimationFrame(resizeState.rafId);
          resizeState.rafId = 0;
        }
        resizeState.active = null;
      }, true);
    }

    function initDragHandle() {
      if (dragState.bound) return;
      dragState.bound = true;
      // Native drag regions via CSS are smoother than JS-based window dragging.
    }

    // HUD button handlers (setup after first render)
    function setupHudHandlers() {
      const screenshotBtn = document.getElementById('ph-screenshot');
      const toggleBtn = document.getElementById('ph-toggle-preview');

      if (screenshotBtn && !screenshotBtn._handled) {
        screenshotBtn._handled = true;
        screenshotBtn.addEventListener('click', () => {
          ipcRenderer.send('overlay-screenshot');
        });
      }

      if (toggleBtn && !toggleBtn._handled) {
        toggleBtn._handled = true;
        toggleBtn.addEventListener('click', () => {
          const now = document.body.classList.contains('preview-mode');
          const next = !now;
          ipcRenderer.send('ui-preview-mode', next);
          setPreviewMode(next);
        });
      }
    }

    ipcRenderer.on('overlay-screenshot-saved', (event, file) => {
      const btn = document.getElementById('ph-screenshot');
      if (btn) {
        btn.textContent = 'Saved ✓';
        setTimeout(() => btn.textContent = 'Screenshot', 1200);
      }
    });

    ipcRenderer.on('overlay-screenshot-failed', (event, err) => {
      console.error('screenshot failed', err);
      const btn = document.getElementById('ph-screenshot');
      if (btn) {
        btn.textContent = 'Failed ✗';
        setTimeout(() => btn.textContent = 'Screenshot', 1600);
      }
    });

    // Custom tooltip implementation: shows data-tooltip attributes
    let _tooltipEl = null;
    function ensureTooltip() {
      if (_tooltipEl) return _tooltipEl;
      _tooltipEl = document.createElement('div');
      _tooltipEl.className = 'custom-tooltip';
      document.body.appendChild(_tooltipEl);
      return _tooltipEl;
    }

    function setupTooltips() {
      const tooltip = ensureTooltip();
      document.body.addEventListener('mouseover', (e) => {
        const target = e.target.closest && e.target.closest('[data-tooltip]');
        if (!target) return;
        const txt = target.getAttribute('data-tooltip');
        if (!txt) return;
        tooltip.textContent = txt;
        tooltip.classList.add('show');
        positionTooltipFor(target, tooltip);
      });
      document.body.addEventListener('mouseout', (e) => {
        const related = e.relatedTarget;
        const leavingFrom = e.target.closest && e.target.closest('[data-tooltip]');
        if (!leavingFrom) return;
        // hide tooltip
        if (tooltip) tooltip.classList.remove('show');
      });
      document.body.addEventListener('mousemove', (e) => {
        if (!(_tooltipEl && _tooltipEl.classList.contains('show'))) return;
        const t = document.elementFromPoint(e.clientX, e.clientY);
        const ttTarget = t && t.closest && t.closest('[data-tooltip]');
        if (!ttTarget) return;
        positionTooltipFor(ttTarget, _tooltipEl);
      });
    }

    function positionTooltipFor(target, tooltip) {
      const rect = target.getBoundingClientRect();
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      // place above target when space allows, otherwise below
      const aboveY = rect.top - th - 8;
      const belowY = rect.bottom + 8;
      const x = Math.min(Math.max(rect.left + (rect.width - tw)/2, 8), window.innerWidth - tw - 8);
      const y = aboveY > 8 ? aboveY : (belowY + th < window.innerHeight ? belowY : Math.max(8, aboveY));
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    // Setup handlers after initial render and whenever render happens
    const originalRender = render;
    render = function() {
      originalRender.call(this);
      setupHudHandlers();
      setupTooltips();
    };

    render();

    // Toggle a body class when overlay background alpha is zero so borders/shadows can be removed
    function updateTransparencyClass() {
      try {
        const raw = getComputedStyle(document.documentElement).getPropertyValue('--overlay-bg-alpha');
        const n = parseFloat((raw || '').trim()) || 0;
        if (n <= 0) {
          document.body.classList.add('overlay-full-transparent');
        } else {
          document.body.classList.remove('overlay-full-transparent');
        }
      } catch (e) {
        // ignore
      }
    }

    // run on startup and after renders
    updateTransparencyClass();

    // listen for IPC updates to alpha
    ipcRenderer.on('overlay-set-alpha', (event, alpha) => {
      try {
        const v = Number(alpha) || 0;
        document.documentElement.style.setProperty('--overlay-bg-alpha', String(v));
        updateTransparencyClass();
      } catch (e) {}
    });

    // Prevent right-click context menu in overlay so users can't get stuck in DevTools
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Handle hotkey IPC directly in overlay (bypass main window if it's hidden)
    ipcRenderer.on('hotkey', (event, scope, action) => {
      if (scope === 'bamboozle') {
        if (action === 'timer-start' && !bamLocal.running) {
          bamLocal.remaining = bamLocal.duration;
          bamLocal.running = true;
          bamLocal.lastUpdate = performance.now();
          startBamRaf();
          updateBamDom();
        } else if (action === 'timer-pause') {
          bamLocal.running = false;
          stopBamRaf();
          updateBamDom();
        } else if (action === 'timer-reset') {
          bamLocal.running = false;
          stopBamRaf();
          bamLocal.remaining = 0;
          updateBamDom();
        }
      }
    });

    // minimal boxes mode is tied to transparency: handled in updateTransparencyClass()
  </script>
</body>
</html>
